spring:
  application:
    name: ledger-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: NON_NULL
    serialization:
      write-dates-as-timestamps: false

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:swiftpay_ledger}
    username: ${POSTGRES_USER:mahipaul}
    password: ${POSTGRES_PASSWORD:12345678}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Tuned 15 → 30 to absorb the increased concurrency on the consumer side
      # (3 listener threads × per-message debit+credit+audit+outbox).
      maximum-pool-size: 30
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:myuser}
      password: ${REDIS_PASSWORD:MyNewStr0ngPass!}
      timeout: 2000ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
    consumer:
      group-id: ${KAFKA_GROUP_ID:ledger-service}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    # Trusted packages + wire-format logical names ↔ local class FQNs are configured
    # programmatically on the deserializer in Kafka{Producer,Consumer}Config — setting
    # them in YAML too would trip Spring Kafka's "setters OR properties, not both" guard.
    listener:
      ack-mode: manual_immediate
      # Tuned 1 → 3 (= payment-initiated partition count) for parallel settlement.
      concurrency: 3

server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

swiftpay:
  topics:
    payment-initiated: payment-initiated
    payment-completed: payment-completed
    payment-failed: payment-failed
  outbox:
    # Matches gateway's tuning so the ledger's outbox doesn't become the new bottleneck.
    poll-delay-ms: 100
    batch-size: 200
    send-timeout-ms: 5000
    max-retry-count: 8
    max-backoff-seconds: 300
    rescue-delay-ms: 30000
    stuck-publishing-threshold-seconds: 60