# Single-node Apache Kafka in KRaft mode (no Zookeeper). Matches the topology
# the docker-compose stack uses, just with K8s primitives.
#
# Two listeners:
#   - INTERNAL on :9092 for in-cluster traffic (FQDN: kafka.swiftpay.svc.cluster.local:9092)
#   - EXTERNAL on :29092 (exposed via the overlay's NodePort patch for host k6 / Kafka UI)
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: swiftpay
  labels: { app.kubernetes.io/name: kafka, app.kubernetes.io/part-of: swiftpay }
spec:
  clusterIP: None       # headless so the broker is reachable as kafka-0.kafka… by its hostname
  selector: { app.kubernetes.io/name: kafka }
  ports:
    - name: internal
      port: 9092
      targetPort: 9092
    - name: external
      port: 29092
      targetPort: 29092
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: swiftpay
  labels: { app.kubernetes.io/name: kafka, app.kubernetes.io/part-of: swiftpay }
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: kafka }
  template:
    metadata:
      labels: { app.kubernetes.io/name: kafka, app.kubernetes.io/part-of: swiftpay }
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.8.0
          ports:
            - { containerPort: 9092,  name: internal }
            - { containerPort: 29092, name: external }
          env:
            - { name: KAFKA_NODE_ID,                                value: "1" }
            - { name: KAFKA_PROCESS_ROLES,                          value: "broker,controller" }
            - { name: KAFKA_LISTENERS,                              value: "INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093" }
            - { name: KAFKA_ADVERTISED_LISTENERS,                   value: "INTERNAL://kafka.swiftpay.svc.cluster.local:9092,EXTERNAL://localhost:29092" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES,              value: "CONTROLLER" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP,         value: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME,             value: "INTERNAL" }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS,               value: "1@localhost:9093" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR,       value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR,          value: "1" }
            - { name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS,       value: "0" }
            - { name: KAFKA_AUTO_CREATE_TOPICS_ENABLE,              value: "true" }
            - { name: KAFKA_LOG_DIRS,                               value: "/var/lib/kafka/data" }
            - { name: CLUSTER_ID,                                   value: "MkU3OEVBNTcwNTJENDM2Qk" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/kafka/data }
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            tcpSocket: { port: 9092 }
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests: { memory: 512Mi, cpu: 250m  }
            limits:   { memory: 1Gi,   cpu: 1500m }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests: { storage: 2Gi }
---
# Best-effort topic bootstrap. Runs once, creates the three SwiftPay topics if
# they don't already exist. Spring Kafka's auto-create handles ad-hoc topics
# (retry, dlt) too, but creating the main ones explicitly makes broker
# inspection more predictable.
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-init
  namespace: swiftpay
  labels: { app.kubernetes.io/name: kafka-init, app.kubernetes.io/part-of: swiftpay }
spec:
  backoffLimit: 6
  template:
    metadata:
      labels: { app.kubernetes.io/name: kafka-init, app.kubernetes.io/part-of: swiftpay }
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kafka-init
          image: apache/kafka:3.8.0
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              echo "Waiting for kafka..."
              until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka.swiftpay.svc.cluster.local:9092 --list >/dev/null 2>&1; do
                sleep 3
              done
              echo "Creating SwiftPay topics..."
              for t in payment-initiated payment-completed payment-failed; do
                /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka.swiftpay.svc.cluster.local:9092 \
                  --create --if-not-exists --topic "$t" --partitions 3 --replication-factor 1
              done
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka.swiftpay.svc.cluster.local:9092 --list
