# Redis ACL config — must match the gateway / ledger application.yml expectations:
#   user myuser  >MyNewStr0ngPass!  ~*  &*  +@all
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: swiftpay
data:
  users.acl: |
    user default on nopass ~* &* +@all
    user myuser on >MyNewStr0ngPass! ~* &* +@all
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: swiftpay
  labels: { app.kubernetes.io/name: redis, app.kubernetes.io/part-of: swiftpay }
spec:
  selector: { app.kubernetes.io/name: redis }
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: swiftpay
  labels: { app.kubernetes.io/name: redis, app.kubernetes.io/part-of: swiftpay }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: redis }
  template:
    metadata:
      labels: { app.kubernetes.io/name: redis, app.kubernetes.io/part-of: swiftpay }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--aclfile", "/etc/redis/users.acl"]
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: acl
              mountPath: /etc/redis
          readinessProbe:
            tcpSocket: { port: 6379 }
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { memory: 64Mi,  cpu: 50m  }
            limits:   { memory: 256Mi, cpu: 500m }
      volumes:
        - name: acl
          configMap:
            name: redis-config
