apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: swiftpay
  labels: { app.kubernetes.io/name: postgres, app.kubernetes.io/part-of: swiftpay }
spec:
  clusterIP: None        # headless service so the StatefulSet pods get a stable DNS name
  selector: { app.kubernetes.io/name: postgres }
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: swiftpay
  labels: { app.kubernetes.io/name: postgres, app.kubernetes.io/part-of: swiftpay }
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: postgres }
  template:
    metadata:
      labels: { app.kubernetes.io/name: postgres, app.kubernetes.io/part-of: swiftpay }
    spec:
      containers:
        - name: postgres
          image: postgres:14-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: mahipaul
            - name: POSTGRES_PASSWORD
              value: "12345678"
            - name: POSTGRES_DB
              # The default DB the role connects to; the init script below
              # creates the three swiftpay_* DBs the services actually use.
              value: postgres
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "mahipaul"]
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "mahipaul"]
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests: { memory: 256Mi, cpu: 100m }
            limits:   { memory: 1Gi,   cpu: 1000m }
      volumes:
        - name: init-script
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests: { storage: 1Gi }
