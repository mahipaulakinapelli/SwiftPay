# SwiftPay — transaction-gateway CI
#
# Independent pipeline for this service only. Triggers ONLY when files inside
# `transaction-gateway/` change (or when this workflow itself changes), so
# editing a sibling service never burns CI minutes on this one. That's the
# whole point of the poly-repo layout.
#
# Pipeline: assemble → test + coverage → docker build (verify-only; no push).

name: transaction-gateway CI

on:
  push:
    paths:
      - 'transaction-gateway/**'
      - '.github/workflows/transaction-gateway.yml'
  pull_request:
    paths:
      - 'transaction-gateway/**'
      - '.github/workflows/transaction-gateway.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  # Cancel in-flight CI when a new commit lands on the same branch / PR.
  group: gateway-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICE_DIR: transaction-gateway

jobs:
  build-test:
    name: Build · Test · Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.SERVICE_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      # gradle/actions/setup-gradle@v4 caches:
      #   - ~/.gradle/caches  (dependencies, wrapper distributions)
      #   - ~/.gradle/notifications, ~/.gradle/jdks
      #   - configuration-cache entries
      # Writes are only allowed from the default branch so PRs can't poison the cache.
      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: ${{ env.SERVICE_DIR }}
          cache-read-only: ${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}
          gradle-home-cache-cleanup: true

      - name: Assemble (compile + bootJar without running tests)
        run: ./gradlew assemble --no-daemon

      - name: Test + JaCoCo coverage
        run: ./gradlew test jacocoTestReport --no-daemon

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-transaction-gateway
          path: ${{ env.SERVICE_DIR }}/build/test-results/test
          retention-days: 14

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html-transaction-gateway
          path: ${{ env.SERVICE_DIR }}/build/reports/jacoco/test/html
          retention-days: 14

      - name: Upload JaCoCo XML (for downstream coverage tools)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-xml-transaction-gateway
          path: ${{ env.SERVICE_DIR }}/build/reports/jacoco/test/jacocoTestReport.xml
          retention-days: 14

      - name: Upload boot JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: transaction-gateway-jar
          path: ${{ env.SERVICE_DIR }}/build/libs/transaction-gateway-*-SNAPSHOT.jar
          retention-days: 14

  docker-build:
    name: Docker image build (verify-only)
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHA cache for buildx layers — second-and-later builds reuse the
      # JDK + Gradle download + dependency resolution layers.
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./transaction-gateway
          push: false
          load: false
          tags: swiftpay/transaction-gateway:${{ github.sha }}
          cache-from: type=gha,scope=transaction-gateway
          cache-to: type=gha,mode=max,scope=transaction-gateway