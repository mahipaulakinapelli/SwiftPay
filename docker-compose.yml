name: swiftpay

services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: swiftpay-kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:9092,EXTERNAL://localhost:29092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - swiftpay-net

  kafka-init:
    image: apache/kafka:3.8.0
    container_name: swiftpay-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - swiftpay-net
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo "Creating SwiftPay topics..."
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic payment-initiated --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic payment-completed --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic payment-failed --partitions 3 --replication-factor 1
        echo "----- Topics -----"
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
    restart: "no"

  transaction-gateway:
    build:
      context: ./transaction-gateway
    image: swiftpay/transaction-gateway:0.0.1-SNAPSHOT
    container_name: swiftpay-transaction-gateway
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: 5432
      POSTGRES_DB: swiftpay_gateway
      POSTGRES_USER: mahipaul
      POSTGRES_PASSWORD: 12345678
      REDIS_HOST: host.docker.internal
      REDIS_PORT: 6379
      REDIS_PASSWORD: MyNewStr0ngPass!
      SERVER_PORT: 8081
    networks:
      - swiftpay-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  ledger-service:
    build:
      context: ./ledger-service
    image: swiftpay/ledger-service:0.0.1-SNAPSHOT
    container_name: swiftpay-ledger-service
    ports:
      - "8082:8082"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: 5432
      POSTGRES_DB: swiftpay_ledger
      POSTGRES_USER: mahipaul
      POSTGRES_PASSWORD: 12345678
      REDIS_HOST: host.docker.internal
      REDIS_PORT: 6379
      REDIS_USERNAME: myuser
      REDIS_PASSWORD: MyNewStr0ngPass!
      SERVER_PORT: 8082
    networks:
      - swiftpay-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  analytics-worker:
    build:
      context: ./analytics-worker
    image: swiftpay/analytics-worker:0.0.1-SNAPSHOT
    container_name: swiftpay-analytics-worker
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: 5432
      POSTGRES_DB: swiftpay_analytics
      POSTGRES_USER: mahipaul
      POSTGRES_PASSWORD: 12345678
      SERVER_PORT: 8083
    networks:
      - swiftpay-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: swiftpay-kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: swiftpay-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health 2>/dev/null | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - swiftpay-net

networks:
  swiftpay-net:
    name: swiftpay-net
    driver: bridge

volumes:
  kafka-data:
    name: swiftpay-kafka-data