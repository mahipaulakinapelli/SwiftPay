spring:
  application:
    name: analytics-worker
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: NON_NULL
    serialization:
      write-dates-as-timestamps: false

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:swiftpay_analytics}
    username: ${POSTGRES_USER:mahipaul}
    password: ${POSTGRES_PASSWORD:12345678}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 8
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC
    open-in-view: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:analytics-worker}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 500
    # Trusted packages + wire-format logical names ↔ local class FQNs are configured
    # programmatically on the deserializer in KafkaConsumerConfig — setting them in YAML
    # too would trip Spring Kafka's "setters OR properties, not both" guard.
    listener:
      ack-mode: record
      concurrency: 3

server:
  port: ${SERVER_PORT:8083}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

swiftpay:
  topics:
    payment-initiated: payment-initiated
    payment-completed: payment-completed
    payment-failed: payment-failed
